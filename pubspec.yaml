name: score
description: "Score — bijhoud-app voor gezelschapsspellen"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (geen code-generatie nodig)
  sembast: ^3.7.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Routing
  go_router: ^13.2.0

  # Utilities
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
